server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ────────────────────────────────────────────────────────────
    # All non-asset paths fall through to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Discovery sidecar proxy ──────────────────────────────────────────────────
    # Mirrors the Vite dev-server proxy so the browser call is always same-origin.
    #
    # On Linux (prod): the sidecar runs with network_mode:host, so it is
    #   reachable at http://localhost:3001 from inside the nginx container
    #   (nginx is on the bridge but the host loopback is still accessible).
    #
    # On Docker Desktop (Windows/macOS): the sidecar is on the same bridge
    #   network; use http://discovery-sidecar:3001 instead and comment out
    #   network_mode:host in the compose file.
    location /api/discovery {
        proxy_pass         http://localhost:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Image server proxy ───────────────────────────────────────────────────────
    location /api/images {
        client_max_body_size 50M;
        proxy_pass         http://file-server:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Static asset caching ────────────────────────────────────────────────────
    # Vite hashes JS/CSS filenames so we can cache them aggressively.
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
